  - id: no-prod-env-values-in-source
    trigger: "when authoring tests, fixtures, default configs, README examples, or any committed source"
    behavior: "do not write the literal value of any env var on the deploy target. Use generic placeholders (`a@x.com`, `owner@example.com`, `https://your-site.netlify.app`). Netlify's secret scanner is value-based and will fail the build with `Exposed secrets detected: <KEY>`."
    confidence: 0.85
    domain: code-style
    observations: 5
    first_seen: 2026-05-08
    last_seen: 2026-05-10
    evolved_to: .github/skills/learned-no-prod-env-values-in-source/SKILL.md
    evolved_at: 2026-05-10
    evidence:
      - "5b71c1e: replaced literal owner email with `owner@example.com` in recipient-label.test.ts after secret-scan failure"
