[build]
  base = "."
  publish = "dashboard/dist"
  command = "npm run build --workspace=dashboard"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# Test files must never deploy as callable endpoints.
[functions."*"]
  excluded_files = [
    "functions/__tests__/**",
    "functions/**/*.test.ts",
    "functions/**/*.test.tsx"
  ]

[dev]
  framework = "#custom"
  command = "npm run dev --workspace=dashboard"
  targetPort = 5173
  port = 8888
  publish = "dashboard/dist"

# Pixel endpoint — /pixel/<token>  →  /.netlify/functions/pixel?token=<token>.
# Netlify V2 functions on the legacy auto-mount only match the EXACT
# path `/.netlify/functions/pixel` (path suffixes silently fall through
# to the SPA), so the redirect must pass the token via the query string
# rather than the path. functions/pixel.ts reads `?token=` (with a
# path-segment fallback for `netlify dev` and tests).
[[redirects]]
  from = "/pixel/*"
  to = "/.netlify/functions/pixel?token=:splat"
  status = 200

# All other API surface — /api/<name>  →  functions/<name>.ts
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback for the dashboard.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
