[build]
  base = "."
  publish = "dashboard/dist"
  command = "npm run build --workspace=dashboard"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# Test files must never deploy as callable endpoints.
[functions."*"]
  excluded_files = [
    "functions/__tests__/**",
    "functions/**/*.test.ts",
    "functions/**/*.test.tsx"
  ]

[dev]
  framework = "#custom"
  command = "npm run dev --workspace=dashboard"
  targetPort = 5173
  port = 8888
  publish = "dashboard/dist"

# Pixel endpoint — /pixel/<token>  →  /.netlify/functions/pixel/<token>.
# pixel.ts is intentionally left without `export const config` so it
# stays on the default legacy auto-mount, which accepts the splat'd
# path suffix. We tried V2 `config.path` and the route silently failed
# to register at deploy time.
[[redirects]]
  from = "/pixel/*"
  to = "/.netlify/functions/pixel/:splat"
  status = 200

# All other API surface — /api/<name>  →  functions/<name>.ts
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback for the dashboard.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
